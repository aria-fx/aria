name: ARIA Auth Core CI

on:
  push:
    paths:
      - "src/aria-auth-core/**"
      - "src/aria-cli/**"
      - ".github/workflows/aria-auth-core-*.yml"
  pull_request:
    paths:
      - "src/aria-auth-core/**"
      - "src/aria-cli/**"
      - ".github/workflows/aria-auth-core-*.yml"

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test (.NET ${{ matrix.dotnet-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet-version: ["8.0.x", "9.0.x", "10.0.x"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Restore and build auth core
        run: |
          dotnet restore src/aria-auth-core/Aria.Auth.Core.csproj
          dotnet build src/aria-auth-core/Aria.Auth.Core.csproj -c Release --no-restore

      - name: Restore and build CLI consumer
        run: |
          dotnet restore src/aria-cli/Aria.Cli.csproj
          dotnet build src/aria-cli/Aria.Cli.csproj -c Release --no-restore

      - name: Run CLI tests
        run: dotnet test src/aria-cli/Aria.Cli.Tests/Aria.Cli.Tests.csproj -c Release
          --no-build

      - name: Run Auth Core tests
        run: dotnet test src/aria-auth-core/Aria.Auth.Core.Tests/Aria.Auth.Core.Tests.csproj -c Release
          --no-build
